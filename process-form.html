<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Postul'ON — Processus</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Firebase SDK (module) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, collection, addDoc, doc,
      getDoc, updateDoc, Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCiVz4-sUKNDydb8o7_uqewUCBhQeNjNKw",
      authDomain: "postul-on.firebaseapp.com",
      projectId: "postul-on",
      storageBucket: "postul-on.firebasestorage.app",
      messagingSenderId: "227373874590",
      appId: "1:227373874590:web:10f68b90ec723564eb2a8f"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // Expose raw Firestore functions to main script
    window._db         = db;
    window._collection = collection;
    window._addDoc     = addDoc;
    window._doc        = doc;
    window._getDoc     = getDoc;
    window._updateDoc  = updateDoc;
    window._Timestamp  = Timestamp;

    window.firebaseReady = true;
    document.dispatchEvent(new Event("firebaseReady"));
  </script>

  <style>
    :root {
      --blue-900: #0a1628;
      --blue-700: #102a50;
      --blue-500: #1e4d8c;
      --blue-400: #2563c4;
      --blue-300: #3b82f6;
      --blue-200: #93c5fd;
      --blue-100: #dbeafe;
      --blue-50:  #eff6ff;
      --gold: #f0c040;
      --danger: #ef4444;
      --bg: #f0f4f9;
      --surface: #ffffff;
      --surface-2: #f8faff;
      --border: rgba(30,77,140,0.10);
      --text-primary: #0a1628;
      --text-secondary: #4b6b9a;
      --text-muted: #94adc7;
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --shadow-sm: 0 2px 8px rgba(10,22,40,0.06);
      --shadow-md: 0 4px 20px rgba(10,22,40,0.10);
      --shadow-accent: 0 4px 20px rgba(59,130,246,0.30);
      --font: 'Quicksand', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--blue-200); border-radius: 4px; }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(145deg, var(--blue-900) 0%, var(--blue-700) 50%, var(--blue-500) 100%);
      padding: 36px 20px 18px;
      position: relative; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute;
      top: -60px; right: -60px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(59,130,246,0.25) 0%, transparent 70%);
      border-radius: 50%;
    }
    .header-inner { position: relative; z-index: 1; }

    .header-nav {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .back-btn {
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .back-btn svg { width: 16px; height: 16px; stroke: white; stroke-width: 2.5; fill: none; }
    .logo-text { font-size: 18px; font-weight: 700; color: white; letter-spacing: -0.3px; }
    .logo-text .logo-on { color: var(--gold); }

    .header-icon {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .header-icon svg { width: 22px; height: 22px; stroke: white; stroke-width: 1.8; fill: none; }
    .header-title-text { font-size: 22px; font-weight: 700; color: white; }
    .header-subtitle { font-size: 12px; color: var(--blue-200); margin-top: 3px; font-weight: 500; }

    /* ── CONTENT ── */
    .content { padding: 20px 14px 40px; }

    /* ── CARD ── */
    .card {
      background: var(--surface); border-radius: var(--radius-lg);
      padding: 20px; box-shadow: var(--shadow-sm);
      border: 1px solid var(--border); margin-bottom: 14px;
    }
    .section-label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--text-secondary); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 7px;
    }
    .form-input, .form-textarea {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid var(--border); border-radius: var(--radius-md);
      font-family: var(--font); font-size: 14px; font-weight: 500;
      color: var(--text-primary); background: var(--surface-2);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--blue-300);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
      background: var(--surface);
    }
    .form-textarea { resize: none; height: 90px; }

    /* ── LOGO PREVIEW ── */
    .logo-preview-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .logo-preview-box {
      width: 56px; height: 56px; border-radius: var(--radius-md);
      background: var(--surface-2); border: 2px dashed var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: var(--blue-300);
      overflow: hidden; flex-shrink: 0;
    }
    .logo-preview-box img { width: 100%; height: 100%; object-fit: contain; }
    .logo-actions { flex: 1; }
    .logo-url-input {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius-md);
      font-family: var(--font); font-size: 13px; font-weight: 500;
      color: var(--text-primary); background: var(--surface-2); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .logo-url-input:focus { border-color: var(--blue-300); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
    .logo-hint { font-size: 11px; color: var(--text-muted); margin-top: 5px; font-weight: 500; }

    /* ── SUGGESTIONS ── */
    .suggestions-box {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius-md); margin-top: 5px;
      overflow: hidden; box-shadow: var(--shadow-md); display: none;
    }
    .suggestions-box.open { display: block; }
    .suggestion-item {
      padding: 11px 14px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: var(--blue-50); }
    .suggestion-logo {
      width: 32px; height: 32px; border-radius: 7px;
      background: var(--surface-2); border: 1px solid var(--border);
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--blue-400); flex-shrink: 0;
    }
    .suggestion-logo img { width: 100%; height: 100%; object-fit: contain; }
    .suggestion-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .suggestion-domain { font-size: 11px; color: var(--text-muted); font-weight: 500; }

    /* ── BUTTONS ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 14px 18px; border: none; border-radius: var(--radius-md);
      font-family: var(--font); font-size: 14px; font-weight: 700;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      width: 100%;
    }
    .btn:active { transform: scale(0.97); }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .btn-primary { background: linear-gradient(135deg, var(--blue-400), var(--blue-300)); color: white; box-shadow: var(--shadow-accent); }
    .btn-secondary { background: var(--surface-2); color: var(--text-primary); border: 1.5px solid var(--border); }
    .btn-row { display: flex; gap: 10px; }
    .btn-row .btn { flex: 1; }

    /* ── LOADING OVERLAY ── */
    .loading-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      gap: 10px; font-size: 14px; font-weight: 600; color: var(--text-secondary);
      z-index: 300;
    }
    .loading-screen.hidden { display: none; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue-400); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--blue-900); color: white;
      padding: 10px 18px; border-radius: 40px;
      font-size: 13px; font-weight: 600; box-shadow: 0 8px 32px rgba(10,22,40,0.14);
      z-index: 500; opacity: 0; transition: opacity 0.2s, transform 0.2s; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>Chargement…
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="header-nav">
      <button class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="logo-text">Postul<span class="logo-on">'ON</span></div>
    </div>
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8"/></svg>
    </div>
    <div class="header-title-text" id="pageTitle">Nouveau processus</div>
    <div class="header-subtitle">Informations de l'entreprise</div>
  </div>
</header>

<!-- CONTENT -->
<main class="content">

  <div class="card">
    <div class="section-label">Entreprise *</div>
    <div class="form-group" style="margin-bottom:0">
      <input class="form-input" id="companyName" placeholder="Ex: Google, Spotify…"
        autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="onCompanyNameInput()" />
      <div class="suggestions-box" id="suggestionsBox"></div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Logo (optionnel)</div>
    <div class="logo-preview-row">
      <div class="logo-preview-box" id="logoPreview">?</div>
      <div class="logo-actions">
        <input class="logo-url-input" id="logoUrl" placeholder="URL du logo…" oninput="onLogoUrlInput()" />
        <div class="logo-hint">Ex: https://logo.clearbit.com/google.com</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Notes (optionnel)</div>
    <textarea class="form-textarea" id="processNotes"
      placeholder="Rémunération visée, contact RH, stack technique, lien offre…"></textarea>
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="goBack()">Annuler</button>
    <button class="btn btn-primary" onclick="saveProcess()">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Enregistrer
    </button>
  </div>

</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ════ GUARD : code requis ════ */
const userCode = localStorage.getItem('postul_on_code');
if (!userCode) { window.location.replace('login.html'); }

/* ════ URL PARAMS ════ */
const editId = new URLSearchParams(window.location.search).get('id');

/* ════ HELPERS FIRESTORE ════ */
function getCol(name) {
  return window._collection(window._db, 'data', userCode, name);
}
function getDocRef(colName, id) {
  return window._doc(window._db, 'data', userCode, colName, id);
}

/* ════ FIREBASE INIT ════ */
function waitFirebase(cb) {
  if (window.firebaseReady) cb();
  else document.addEventListener('firebaseReady', cb, { once: true });
}

waitFirebase(async () => {
  if (editId) {
    document.getElementById('pageTitle').textContent = 'Modifier le processus';
    await loadProcess(editId);
  }
  document.getElementById('loadingScreen').classList.add('hidden');
});

/* ════ LOAD (edit mode) ════ */
async function loadProcess(id) {
  try {
    const snap = await window._getDoc(getDocRef('processes', id));
    if (!snap.exists()) { goBack(); return; }
    const p = snap.data();
    document.getElementById('companyName').value = p.companyName || '';
    document.getElementById('logoUrl').value = p.logoUrl || '';
    document.getElementById('processNotes').value = p.notes || '';
    updateLogoPreview(p.logoUrl, p.companyName);
  } catch(e) {
    console.error(e);
    showToast('Erreur de chargement', true);
  }
}

/* ════ SAVE ════ */
async function saveProcess() {
  const name = document.getElementById('companyName').value.trim();
  if (!name) { showToast('⚠️ Le nom est requis', true); return; }
  const data = {
    companyName: name,
    logoUrl: document.getElementById('logoUrl').value.trim(),
    notes: document.getElementById('processNotes').value.trim(),
  };
  try {
    if (editId) {
      await window._updateDoc(getDocRef('processes', editId), data);
      showToast('Processus mis à jour ✓');
    } else {
      data.createdAt = window._Timestamp.now();
      await window._addDoc(getCol('processes'), data);
      showToast('Processus ajouté ✓');
    }
    setTimeout(() => { window.location.href = 'index.html'; }, 600);
  } catch(e) {
    console.error(e);
    showToast('Erreur Firebase', true);
  }
}

/* ════ NAVIGATION ════ */
function goBack() { window.location.href = 'index.html'; }

/* ════ AUTOCOMPLETE ════ */
let searchTimeout = null;
function onCompanyNameInput() {
  const val = document.getElementById('companyName').value.trim();
  clearTimeout(searchTimeout);
  if (val.length < 2) { closeSuggestions(); return; }
  searchTimeout = setTimeout(() => fetchSuggestions(val), 500);
}

async function fetchSuggestions(query) {
  try {
    const res = await fetch(`https://autocomplete.clearbit.com/v1/companies/suggest?query=${encodeURIComponent(query)}`);
    if (!res.ok) { closeSuggestions(); return; }
    showSuggestions((await res.json()).slice(0, 5));
  } catch { closeSuggestions(); }
}

function showSuggestions(companies) {
  const box = document.getElementById('suggestionsBox');
  if (!companies || !companies.length) { closeSuggestions(); return; }
  box.innerHTML = companies.map(c => `
    <div class="suggestion-item" onclick="selectCompany('${esc(c.name)}','${esc(c.logo||'')}')">
      <div class="suggestion-logo">
        ${c.logo ? `<img src="${esc(c.logo)}" onerror="this.parentNode.innerHTML='${initials(c.name)}'"/>` : initials(c.name)}
      </div>
      <div>
        <div class="suggestion-name">${esc(c.name)}</div>
        <div class="suggestion-domain">${esc(c.domain||'')}</div>
      </div>
    </div>`).join('');
  box.classList.add('open');
}

function selectCompany(name, logo) {
  document.getElementById('companyName').value = name;
  const url = logo || `https://logo.clearbit.com/${name.toLowerCase().replace(/\s+/g,'')}.com`;
  document.getElementById('logoUrl').value = url;
  updateLogoPreview(url, name);
  closeSuggestions();
}

function closeSuggestions() {
  document.getElementById('suggestionsBox').classList.remove('open');
}

function onLogoUrlInput() {
  const url = document.getElementById('logoUrl').value.trim();
  const name = document.getElementById('companyName').value.trim();
  updateLogoPreview(url, name);
}

function updateLogoPreview(url, name) {
  const box = document.getElementById('logoPreview');
  box.innerHTML = url
    ? `<img src="${esc(url)}" alt="logo" onerror="this.parentNode.innerHTML='${initials(name)}'"/>`
    : (initials(name) || '?');
}

/* ════ UTILS ════ */
function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? 'var(--danger)' : 'var(--blue-900)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

document.addEventListener('click', e => {
  if (!e.target.closest('#suggestionsBox') && !e.target.closest('#companyName'))
    closeSuggestions();
});
</script>
</body>
</html>
